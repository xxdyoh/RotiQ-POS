name: rotiq_pos
description: "Roti-Q POS"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Network
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0  # Tambahan untuk web storage alternative

  # PDF & Printing
  pdf: ^3.10.4
  printing: ^5.11.0

  # Platform-specific - CONDITIONAL IMPORT
  path_provider: ^2.1.1

  # Sharing
  share_plus: ^7.2.1

  # Internationalization & Formatting
  intl: ^0.18.1

  # Image Processing
  image: ^4.0.17

  # Bluetooth - ONLY FOR MOBILE
  flutter_blue_plus: ^1.30.1

  # Permissions - ONLY FOR MOBILE
  permission_handler: ^11.0.1

  # Printer Utils
  esc_pos_utils_plus: ^2.0.4

  # UI & Animations
  another_flutter_splash_screen: ^1.2.1
  google_fonts: ^6.1.0
  animations: ^2.0.8
  pull_to_refresh: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # Responsive & Layout
  flutter_layout_grid: ^1.0.3  # Baru: Untuk grid yang lebih baik di web
  responsive_framework: ^0.2.0  # Baru: Framework responsive

  # Web-specific
  universal_html: ^2.2.4  # Baru: Untuk DOM manipulation di web
  url_launcher: ^6.2.1  # Baru: Untuk buka URL di web

  provider: ^6.1.2

  # WebSocket untuk web
  web_socket_channel: ^3.0.3

  # Platform detection
  universal_io: ^2.2.2

  syncfusion_flutter_datagrid: ^27.1.48
  syncfusion_flutter_datagrid_export: ^27.1.48
  syncfusion_flutter_xlsio: ^27.1.48
  syncfusion_flutter_pdf: ^27.1.48
  pivot_table:
    git:
      url: https://github.com/BoyPhanna/flutter_pivot_table.git
  open_file: ^3.3.2

dependency_overrides:
  image: ^4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Launcher & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0

  # Web Build Tools
  build_runner: ^2.4.8

# Flutter Configuration
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - packages/pivot_table/assets/

flutter_launcher_icons:
  android: true
  ios: true
  web: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true
  ios: true
  web: true