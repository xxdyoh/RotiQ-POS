  <script>
    // Override keamanan untuk pivot_table (sama seperti sebelumnya)
    (function() {
      Object.defineProperty(HTMLIFrameElement.prototype, 'sandbox', {
        get: function() {
          return {
            value: {
              add: function() {},
              remove: function() {},
              supports: function() { return true; },
              length: 0,
              item: function() { return null; }
            }
          };
        },
        set: function(value) {},
        configurable: true
      });

      const originalCreateElement = document.createElement;
      document.createElement = function(tagName, options) {
        const element = originalCreateElement.call(document, tagName, options);

        if (tagName && tagName.toLowerCase() === 'iframe') {
          setTimeout(() => {
            try {
              if (element.hasAttribute('sandbox')) {
                element.removeAttribute('sandbox');
              }
              element.setAttribute('allow', '*');
              element.setAttribute('allowfullscreen', 'true');
            } catch (e) {}
          }, 0);
        }
        return element;
      };

      console.log('Pivot table patches applied');
    })();
  </script>

<script>
  const APP_VERSION = '20260417_001';

  (function() {
    // Deteksi apakah sedang di local development
    const hostname = window.location.hostname;
    const isLocalhost = hostname === 'localhost' ||
                        hostname === '127.0.0.1' ||
                        hostname.startsWith('192.168.') ||
                        hostname.startsWith('10.0.') ||
                        hostname.startsWith('172.');

    // Jika di local, matikan auto-reload
    if (isLocalhost) {
      console.log('🏠 Local development - Auto-reload disabled');
      console.log('📱 Current version:', APP_VERSION);
      return;
    }

    console.log('🌐 Production mode - Auto-reload enabled');
    console.log('📱 App Version:', APP_VERSION);

    let isChecking = false;

    async function checkVersion() {
      if (isChecking) return;
      isChecking = true;

      try {
        const response = await fetch('/version.json?t=' + Date.now());

        if (!response.ok) {
          console.log('⚠️ version.json not found (status:', response.status, ')');
          return;
        }

        const data = await response.json();

        if (data.version && data.version !== APP_VERSION) {
          console.log('🔄 New version detected! Current:', APP_VERSION, 'New:', data.version);
          console.log('🧹 Clearing cache...');

          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(key => caches.delete(key)));
          }

          sessionStorage.clear();

          setTimeout(() => {
            window.location.reload(true);
          }, 500);
        } else {
          console.log('✅ Version', APP_VERSION, 'is up to date');
        }
      } catch (e) {
        console.log('⚠️ Version check failed:', e.message);
      } finally {
        isChecking = false;
      }
    }

    // Cek setiap 3 menit
    setInterval(checkVersion, 180000);

    // Cek saat tab focus
    window.addEventListener('focus', checkVersion);

    // Cek pertama kali setelah 3 detik
    setTimeout(checkVersion, 3000);
  })();
</script>
